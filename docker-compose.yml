version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: studentmanager-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: StudentManagerDB
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studentmanager-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=StudentManagerDB;User Id=root;Password=${MYSQL_ROOT_PASSWORD:-root123};CharSet=utf8mb4;"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    volumes:
      - app_uploads:/app/uploads
      - app_wwwroot_imge:/app/wwwroot/imge
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  app_uploads:
  app_wwwroot_imge:
